<svg xmlns="http://www.w3.org/2000/svg" width="816" height="297" viewBox="0 0 816 297" role="img" aria-labelledby="title desc">
  <title id="title">Compresseur d&#x27;air et valorisation CEE</title>
  <desc id="desc">Schéma de récupération thermique sur compresseur avec valorisation CEE.</desc>
  <defs>
