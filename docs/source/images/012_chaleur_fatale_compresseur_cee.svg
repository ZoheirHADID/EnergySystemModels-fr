      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
    <style>
      .diagram-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .node-title { font: 700 13px Arial, sans-serif; fill: #111827; }
      .node-subtitle { font: 11px Arial, sans-serif; fill: #374151; }
      .edge-label { font: 11px Arial, sans-serif; fill: #374151; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="38" y="26" class="diagram-title">Compresseur d&#x27;air et valorisation CEE</text>
  <path d="M 208 143.0 C 265.5 143.0, 265.5 143.0, 323 143.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="265.5" y="135.0" text-anchor="middle" class="edge-label">70 degC env.</text>
<path d="M 493 143.0 C 550.5 143.0, 550.5 83.0, 608 83.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="550.5" y="105.0" text-anchor="middle" class="edge-label">chaleur valorisée</text>
<path d="M 493 143.0 C 550.5 143.0, 550.5 204.0, 608 204.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="550.5" y="165.5" text-anchor="middle" class="edge-label">calcul_CEE</text>
  <rect x="38" y="110" width="170" height="66" rx="8" fill="#fff4de" stroke="#b46a00" stroke-width="1.6"/>
<text x="123.0" y="130" text-anchor="middle" class="node-title">Compresseur</text>
<text x="123.0" y="146" text-anchor="middle" class="node-title">d&amp;#x27;air</text>
<text x="123.0" y="162" text-anchor="middle" class="node-subtitle">chaleur fatale</text>
<rect x="323" y="110" width="170" height="66" rx="8" fill="#e9f8ef" stroke="#2d7d46" stroke-width="1.6"/>
<text x="408.0" y="136" text-anchor="middle" class="node-title">Récupérateur</text>
<text x="408.0" y="162" text-anchor="middle" class="node-subtitle">air/eau ou air/air</text>
<rect x="608" y="50" width="170" height="66" rx="8" fill="#fff0f0" stroke="#b33a3a" stroke-width="1.6"/>
<text x="693.0" y="76" text-anchor="middle" class="node-title">Chauffage utile</text>
<text x="693.0" y="102" text-anchor="middle" class="node-subtitle">locaux, ECS, procédé</text>
<rect x="608" y="171" width="170" height="66" rx="8" fill="#eefaf7" stroke="#13866f" stroke-width="1.6"/>
<text x="693.0" y="197" text-anchor="middle" class="node-title">Fiche IND-UT-103</text>
