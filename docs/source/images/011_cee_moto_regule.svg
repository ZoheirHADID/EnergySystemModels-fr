<svg xmlns="http://www.w3.org/2000/svg" width="816" height="176" viewBox="0 0 816 176" role="img" aria-labelledby="title desc">
  <title id="title">CEE - Système moto-régulé</title>
  <desc id="desc">Schéma de calcul CEE pour un ventilateur équipé d&#x27;un système moto-régulé.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
    <style>
      .diagram-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .node-title { font: 700 13px Arial, sans-serif; fill: #111827; }
      .node-subtitle { font: 11px Arial, sans-serif; fill: #374151; }
      .edge-label { font: 11px Arial, sans-serif; fill: #374151; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="38" y="26" class="diagram-title">CEE - Système moto-régulé</text>
  <path d="M 208 83.0 C 265.5 83.0, 265.5 83.0, 323 83.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="265.5" y="75.0" text-anchor="middle" class="edge-label">puissance nominale</text>
<path d="M 493 83.0 C 550.5 83.0, 550.5 83.0, 608 83.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="550.5" y="75.0" text-anchor="middle" class="edge-label">calcul_CEE</text>
  <rect x="38" y="50" width="170" height="66" rx="8" fill="#eaf4ff" stroke="#2670a8" stroke-width="1.6"/>
<text x="123.0" y="76" text-anchor="middle" class="node-title">Ventilateur</text>
<text x="123.0" y="102" text-anchor="middle" class="node-subtitle">55 kW</text>
<rect x="323" y="50" width="170" height="66" rx="8" fill="#e9f8ef" stroke="#2d7d46" stroke-width="1.6"/>
<text x="408.0" y="76" text-anchor="middle" class="node-title">Système moto-régulé</text>
<text x="408.0" y="102" text-anchor="middle" class="node-subtitle">2x8 h</text>
<rect x="608" y="50" width="170" height="66" rx="8" fill="#eefaf7" stroke="#13866f" stroke-width="1.6"/>
<text x="693.0" y="76" text-anchor="middle" class="node-title">IND-UT-136</text>
<text x="693.0" y="102" text-anchor="middle" class="node-subtitle">MWh cumac</text>
