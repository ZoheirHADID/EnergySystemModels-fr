<svg xmlns="http://www.w3.org/2000/svg" width="1101" height="297" viewBox="0 0 1101 297" role="img" aria-labelledby="title desc">
  <title id="title">PV - Simulation d&#x27;un site industriel</title>
  <desc id="desc">Chaîne de calcul d&#x27;une production photovoltaïque avec pvlib et PVGIS.</desc>
