<text x="835.5" y="105.0" text-anchor="middle" class="edge-label">pv.calculate</text>
<path d="M 1063 83.0 C 1105 83.0, 1105 204.0, 893 204.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="1105" y="135.5" text-anchor="middle" class="edge-label">pv.summary</text>
  <rect x="38" y="110" width="170" height="66" rx="8" fill="#fff4de" stroke="#b46a00" stroke-width="1.6"/>
<text x="123.0" y="136" text-anchor="middle" class="node-title">Site</text>
