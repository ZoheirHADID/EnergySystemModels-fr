      .node-subtitle { font: 11px Arial, sans-serif; fill: #374151; }
      .edge-label { font: 11px Arial, sans-serif; fill: #374151; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="38" y="26" class="diagram-title">PV - Simulation d&#x27;un site industriel</text>
  <path d="M 208 143.0 C 265.5 143.0, 265.5 143.0, 323 143.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
