<svg xmlns="http://www.w3.org/2000/svg" width="1101" height="297" viewBox="0 0 1101 297" role="img" aria-labelledby="title desc">
  <title id="title">Pinch - Unité de distillation</title>
  <desc id="desc">Intégration thermique entre condenseur, rebouilleur et flux procédé.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
    <style>
      .diagram-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .node-title { font: 700 13px Arial, sans-serif; fill: #111827; }
      .node-subtitle { font: 11px Arial, sans-serif; fill: #374151; }
      .edge-label { font: 11px Arial, sans-serif; fill: #374151; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="38" y="26" class="diagram-title">Pinch - Unité de distillation</text>
  <path d="M 208 83.0 C 408.0 83.0, 408.0 143.0, 608 143.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="408.0" y="105.0" text-anchor="middle" class="edge-label">chaleur</text>
<path d="M 208 204.0 C 408.0 204.0, 408.0 143.0, 608 143.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="408.0" y="165.5" text-anchor="middle" class="edge-label">besoin</text>
<path d="M 493 143.0 C 550.5 143.0, 550.5 143.0, 608 143.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="550.5" y="135.0" text-anchor="middle" class="edge-label">mCp</text>
<path d="M 778 143.0 C 835.5 143.0, 835.5 143.0, 893 143.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="835.5" y="135.0" text-anchor="middle" class="edge-label">appariements</text>
  <rect x="38" y="50" width="170" height="66" rx="8" fill="#fff4de" stroke="#b46a00" stroke-width="1.6"/>
<text x="123.0" y="76" text-anchor="middle" class="node-title">Condenseur</text>
<text x="123.0" y="102" text-anchor="middle" class="node-subtitle">flux chaud</text>
<rect x="38" y="171" width="170" height="66" rx="8" fill="#fff0f0" stroke="#b33a3a" stroke-width="1.6"/>
<text x="123.0" y="197" text-anchor="middle" class="node-title">Rebouilleur</text>
<text x="123.0" y="223" text-anchor="middle" class="node-subtitle">flux froid</text>
<rect x="323" y="110" width="170" height="66" rx="8" fill="#eaf4ff" stroke="#2670a8" stroke-width="1.6"/>
<text x="408.0" y="136" text-anchor="middle" class="node-title">Flux procédé</text>
<text x="408.0" y="162" text-anchor="middle" class="node-subtitle">charge + hydrocarbure</text>
<rect x="608" y="110" width="170" height="66" rx="8" fill="#eaf4ff" stroke="#2670a8" stroke-width="1.6"/>
<text x="693.0" y="136" text-anchor="middle" class="node-title">Analyse Pinch</text>
<text x="693.0" y="162" text-anchor="middle" class="node-subtitle">Qh_min / Qc_min</text>
<rect x="893" y="110" width="170" height="66" rx="8" fill="#e9f8ef" stroke="#2d7d46" stroke-width="1.6"/>
