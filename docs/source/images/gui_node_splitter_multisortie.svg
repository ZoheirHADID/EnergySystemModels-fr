<svg xmlns="http://www.w3.org/2000/svg" width="816" height="297" viewBox="0 0 816 297" role="img" aria-labelledby="title desc">
  <title id="title">Noeud multi-sorties : Diviseur</title>
  <desc id="desc">Exemple de routage d&#x27;une entree fluide vers deux sorties distinctes.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
    <style>
      .diagram-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .node-title { font: 700 13px Arial, sans-serif; fill: #111827; }
      .node-subtitle { font: 11px Arial, sans-serif; fill: #374151; }
      .edge-label { font: 11px Arial, sans-serif; fill: #374151; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="38" y="26" class="diagram-title">Noeud multi-sorties : Diviseur</text>
  <path d="M 208 143.0 C 265.5 143.0, 265.5 143.0, 323 143.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="265.5" y="135.0" text-anchor="middle" class="edge-label">entree</text>
<path d="M 493 143.0 C 550.5 143.0, 550.5 83.0, 608 83.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="550.5" y="105.0" text-anchor="middle" class="edge-label">sortie 1</text>
<path d="M 493 143.0 C 550.5 143.0, 550.5 204.0, 608 204.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="550.5" y="165.5" text-anchor="middle" class="edge-label">sortie 2</text>
  <rect x="38" y="110" width="170" height="66" rx="8" fill="#fff4de" stroke="#b46a00" stroke-width="1.6"/>
<text x="123.0" y="136" text-anchor="middle" class="node-title">Source</text>
<text x="123.0" y="162" text-anchor="middle" class="node-subtitle">[fluide, F, P, h]</text>
<rect x="323" y="110" width="170" height="66" rx="8" fill="#eaf4ff" stroke="#2670a8" stroke-width="1.6"/>
<text x="408.0" y="136" text-anchor="middle" class="node-title">Diviseur</text>
<text x="408.0" y="162" text-anchor="middle" class="node-subtitle">Ratio vers sortie 1</text>
<rect x="608" y="50" width="170" height="66" rx="8" fill="#fff0f0" stroke="#b33a3a" stroke-width="1.6"/>
<text x="693.0" y="76" text-anchor="middle" class="node-title">Output 1</text>
<text x="693.0" y="102" text-anchor="middle" class="node-subtitle">F_b = Ratio x F</text>
<rect x="608" y="171" width="170" height="66" rx="8" fill="#fff0f0" stroke="#b33a3a" stroke-width="1.6"/>
<text x="693.0" y="197" text-anchor="middle" class="node-title">Output 2</text>
<text x="693.0" y="223" text-anchor="middle" class="node-subtitle">F_c = (1-Ratio) x F</text>
</svg>
