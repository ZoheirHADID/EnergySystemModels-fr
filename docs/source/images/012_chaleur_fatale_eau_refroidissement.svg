<svg xmlns="http://www.w3.org/2000/svg" width="816" height="297" viewBox="0 0 816 297" role="img" aria-labelledby="title desc">
  <title id="title">Récupération sur eau de refroidissement</title>
  <desc id="desc">Schéma de principe d&#x27;une source basse température valorisée via un échangeur.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
    <style>
      .diagram-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .node-title { font: 700 13px Arial, sans-serif; fill: #111827; }
      .node-subtitle { font: 11px Arial, sans-serif; fill: #374151; }
      .edge-label { font: 11px Arial, sans-serif; fill: #374151; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="38" y="26" class="diagram-title">Récupération sur eau de refroidissement</text>
  <path d="M 208 143.0 C 265.5 143.0, 265.5 143.0, 323 143.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="265.5" y="135.0" text-anchor="middle" class="edge-label">22 m3/h</text>
<path d="M 493 143.0 C 550.5 143.0, 550.5 83.0, 608 83.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="550.5" y="105.0" text-anchor="middle" class="edge-label">chaleur utile</text>
<path d="M 493 143.0 C 550.5 143.0, 550.5 204.0, 608 204.0" fill="none" stroke="#4b5563" stroke-width="1.7" marker-end="url(#arrow)"/>
<text x="550.5" y="165.5" text-anchor="middle" class="edge-label">source refroidie</text>
  <rect x="38" y="110" width="170" height="66" rx="8" fill="#fff4de" stroke="#b46a00" stroke-width="1.6"/>
<text x="123.0" y="136" text-anchor="middle" class="node-title">Boucle procédé</text>
<text x="123.0" y="162" text-anchor="middle" class="node-subtitle">38 -&gt; 28 degC</text>
<rect x="323" y="110" width="170" height="66" rx="8" fill="#e9f8ef" stroke="#2d7d46" stroke-width="1.6"/>
<text x="408.0" y="136" text-anchor="middle" class="node-title">Échangeur</text>
<text x="408.0" y="162" text-anchor="middle" class="node-subtitle">récupération</text>
<rect x="608" y="50" width="170" height="66" rx="8" fill="#fff0f0" stroke="#b33a3a" stroke-width="1.6"/>
<text x="693.0" y="70" text-anchor="middle" class="node-title">Usage basse</text>
<text x="693.0" y="86" text-anchor="middle" class="node-title">température</text>
<text x="693.0" y="102" text-anchor="middle" class="node-subtitle">préchauffage ou PAC</text>
<rect x="608" y="171" width="170" height="66" rx="8" fill="#f3f4f6" stroke="#697386" stroke-width="1.6"/>
<text x="693.0" y="197" text-anchor="middle" class="node-title">Retour procédé</text>
<text x="693.0" y="223" text-anchor="middle" class="node-subtitle">eau refroidie</text>
</svg>
